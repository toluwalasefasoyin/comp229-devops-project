<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students - COMP229</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px 14px; text-align: left; }
        th { background-color: #f4f4f4; }
        a.btn { padding: 8px 14px; background: #007bff; color: white;
                text-decoration: none; border-radius: 4px; }
        a.btn-danger { background: #dc3545; }
        a.btn-warning { background: #ffc107; color: #333; }
        .actions { display: flex; gap: 8px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .student-count { color: #555; margin-top: 8px; font-size: 15px; }
        .badge { background: #007bff; color: white; border-radius: 12px;
                 padding: 2px 10px; font-size: 13px; margin-left: 6px; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>Student Manager</h1>
    <a class="btn" th:href="@{/students/add}">+ Add Student</a>
</div>

<p class="student-count">
    Total students enrolled:
    <span class="badge" th:text="${students.size()}">0</span>
</p>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Program</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.firstName}"></td>
            <td th:text="${student.lastName}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.program}"></td>
            <td>
                <div class="actions">
                    <a class="btn btn-warning"
                       th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
                    <a class="btn btn-danger"
                       th:href="@{/students/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Delete this student?')">Delete</a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="6" style="text-align:center; color:#999;">
                No students yet. Add one!
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
