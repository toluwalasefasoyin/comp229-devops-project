<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form - COMP229</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], input[type="email"] {
            width: 100%; max-width: 400px;
            padding: 8px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        .error { color: #dc3545; font-size: 13px; margin-top: 4px; }
        .btn { padding: 8px 18px; background: #007bff; color: white;
               border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        a.back { color: #555; text-decoration: none; margin-left: 12px; font-size: 14px; }
    </style>
</head>
<body>

<h1 th:text="${student.id == null ? 'Add Student' : 'Edit Student'}">Student Form</h1>

<form th:action="${student.id == null ? '/students/add' : '/students/edit/' + student.id}"
      th:object="${student}" method="post">

    <div class="form-group">
        <label>First Name</label>
        <input type="text" th:field="*{firstName}" placeholder="e.g. Jane"/>
        <div class="error" th:if="${#fields.hasErrors('firstName')}"
             th:errors="*{firstName}"></div>
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input type="text" th:field="*{lastName}" placeholder="e.g. Smith"/>
        <div class="error" th:if="${#fields.hasErrors('lastName')}"
             th:errors="*{lastName}"></div>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="e.g. jane@email.com"/>
        <div class="error" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
    </div>

    <div class="form-group">
        <label>Program</label>
        <input type="text" th:field="*{program}" placeholder="e.g. Software Engineering"/>
    </div>

    <button class="btn" type="submit"
            th:text="${student.id == null ? 'Add Student' : 'Update Student'}">Submit</button>
    <a class="back" th:href="@{/students}">← Back to list</a>

</form>

</body>
</html>
