<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Form - COMP229</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; padding: 20px; }
        .form-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 40px; max-width: 500px; width: 100%; }
        .page-title { color: #2d3748; font-weight: 600; margin-bottom: 30px; }
        .form-label { font-weight: 600; color: #2d3748; margin-bottom: 8px; }
        .form-control { border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; font-size: 0.95rem; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .form-select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; font-size: 0.95rem; }
        .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .required { color: #e53e3e; }
        .invalid-feedback { color: #e53e3e; font-size: 0.875rem; margin-top: 4px; display: block; }
        .btn-primary { background: #667eea; border: none; padding: 10px 24px; font-weight: 600; }
        .btn-primary:hover { background: #5568d3; }
        .btn-primary:disabled { background: #cbd5e0; }
        .back-link { color: #667eea; text-decoration: none; font-size: 0.95rem; margin-top: 16px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="form-container">
    <h1 class="page-title" th:text="${student.id == null ? 'Add Student' : 'Edit Student'}">Student Form</h1>
    
    <form th:action="${student.id == null ? '/students/add' : '/students/edit/' + student.id}"
          th:object="${student}" method="post" id="studentForm">

        <div class="mb-3">
            <label class="form-label">First Name <span class="required">*</span></label>
            <input type="text" class="form-control" th:field="*{firstName}"
                   placeholder="e.g. Jane" required minlength="2"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                 th:errors="*{firstName}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name <span class="required">*</span></label>
            <input type="text" class="form-control" th:field="*{lastName}"
                   placeholder="e.g. Smith" required minlength="2"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                 th:errors="*{lastName}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email <span class="required">*</span></label>
            <input type="email" class="form-control" th:field="*{email}"
                   placeholder="e.g. jane@email.com" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="mb-4">
            <label class="form-label">Program</label>
            <select class="form-select" th:field="*{program}">
                <option value="">-- Select a Program --</option>
                <option value="Software Engineering Technology">Software Engineering Technology</option>
                <option value="Computer Programming">Computer Programming</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Data Analytics">Data Analytics</option>
                <option value="Computer Systems Technology">Computer Systems Technology</option>
            </select>
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-primary" type="submit"
                    th:text="${student.id == null ? 'Add Student' : 'Update Student'}">
                Submit
            </button>
        </div>

        <a class="back-link" th:href="@{/students}">← Back to list</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
