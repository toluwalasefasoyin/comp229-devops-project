<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Students - COMP229</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 30px 0; }
        .navbar { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .page-title { color: #2d3748; font-weight: 600; margin-bottom: 10px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.07); border-radius: 8px; }
        .card-header { background: #f8f9fa; border-bottom: 2px solid #e2e8f0; font-weight: 600; color: #2d3748; }
        table { margin-bottom: 0; }
        thead th { background: #667eea; color: white; border: none; font-weight: 600; }
        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover { background: #f9f9f9; }
        .btn-sm { font-size: 0.875rem; padding: 0.375rem 0.75rem; }
        .btn-primary { background: #667eea; border: none; }
        .btn-primary:hover { background: #5568d3; }
        .btn-warning { background: #f6ad55; border: none; color: white; }
        .btn-warning:hover { background: #ed8936; }
        .btn-danger:hover { background: #c53030; }
        .empty-state { text-align: center; padding: 40px; color: #718096; }
        .stat-badge { background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title">Student Manager</h1>
            <p class="text-muted mb-0">Total students: <span class="stat-badge" th:text="${students.size()}">0</span></p>
        </div>
        <a class="btn btn-primary" th:href="@{/students/add}"><strong>+ Add Student</strong></a>
    </div>

<div class="card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Program</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td><strong th:text="${student.id}"></strong></td>
                        <td th:text="${student.firstName}"></td>
                        <td th:text="${student.lastName}"></td>
                        <td th:text="${student.email}"></td>
                        <td><span class="badge bg-light text-dark" th:text="${student.program}"></span></td>
                        <td>
                            <a class="btn btn-sm btn-warning"
                               th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
                            <a class="btn btn-sm btn-danger"
                               th:href="@{/students/delete/{id}(id=${student.id})}"
                               onclick="return confirm('Delete this student?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="6">
                            <div class="empty-state">
                                <p style="font-size: 1rem;">No students yet. <a th:href="@{/students/add}" class="text-decoration-none">Add one now!</a></p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
